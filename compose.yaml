# Use postgres/example user/password credentials

services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce

    volumes:
      - ./database/init:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
